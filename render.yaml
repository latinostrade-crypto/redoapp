services:
  # Static Site: React Vite Frontend
  - type: static
    name: redoapp
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://yoapp-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_TELEGRAM_BOT_USERNAME
        value: redo_appbot
      - key: VITE_TELEGRAM_APP_SHORT_NAME
        value: app

  # Web Service: Express Node Backend
  - type: web
    name: redoapp-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: MARKETING_WALLET
        value: UQAihtS9I5lalYn9G8aRgyBq8UNLNC7N-aODCJJUdX4zKGDj
      - key: TICKET_PRICE_TON
        value: 1
      - key: ENABLE_CHAIN_VERIFICATION
        value: false
      - key: TON_VERIFICATION_MODE
        value: manual
      - key: TON_API_BASE_URL
        value: https://tonapi.io/v2
      - key: TON_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: redo_appbot
      - key: TELEGRAM_APP_SHORT_NAME
        value: app
      - key: TELEGRAM_INITDATA_MAX_AGE_SEC
        value: 86400
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_SESSION_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: SUPABASE_STATE_ROW_ID
        value: runtime-state
      - key: PORT
        value: 10000
