services:
  # Static Site: React Vite Frontend
  - type: static
    name: redoapp
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://yoapp-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_TELEGRAM_BOT_USERNAME
        value: redo_appbot
      - key: VITE_TELEGRAM_APP_SHORT_NAME
        value: app
    headers:
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      # Keep the read-only public-queue delivery on the Mini App origin.
      # iMe/iOS WKWebView can suspend cross-origin status transports even
      # after the backend has already placed the player at a table.
      - type: rewrite
        source: /match-api/*
        destination: https://yoapp-backend.onrender.com/api/matchmaker/*

  # Web Service: Express Node Backend
  - type: web
    name: yoapp-backend
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PUBLIC_URL
        value: https://yoapp-backend.onrender.com
      - key: MARKETING_WALLET
        value: UQAihtS9I5lalYn9G8aRgyBq8UNLNC7N-aODCJJUdX4zKGDj
      - key: WITHDRAWAL_SENDER_WALLET
        value: UQAihtS9I5lalYn9G8aRgyBq8UNLNC7N-aODCJJUdX4zKGDj
      - key: TICKET_PRICE_TON
        value: 1
      - key: ENABLE_CHAIN_VERIFICATION
        value: true
      - key: TON_VERIFICATION_MODE
        value: tonapi
      - key: TON_API_BASE_URL
        value: https://tonapi.io/v2
      - key: TON_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: redo_appbot
      - key: TELEGRAM_APP_SHORT_NAME
        value: app
      - key: WITHDRAWAL_OPERATOR_CHAT_ID
        value: 5152039743
      - key: WITHDRAWAL_OPERATOR_USERNAME
        value: allin_gram
      - key: TELEGRAM_INITDATA_MAX_AGE_SEC
        value: 900
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_SESSION_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: SUPABASE_STATE_ROW_ID
        value: runtime-state
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REFERRAL_CACHE_TTL_SEC
        value: 30
      - key: REDIS_CACHE_NAMESPACE
        value: redoapp:v1
      - key: PORT
        value: 10000
